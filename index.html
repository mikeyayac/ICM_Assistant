<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1B4FA0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ICM Assistant" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

  <!-- Adobe PDF Embed SDK is loaded lazily on first PDF open (see ensureAdobeSDK) -->

  <title>ICM Assistant</title>
  <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#16202B;
      --muted:#5B6B7C;
      --surface:#FAFBFC;
      --card:#FFFFFF;
      --line:#E3E8EE;
      --accent:#1B4FA0;
      --accent-ink:#0E2F63;
      --accent-wash:#EEF3FB;
      --verified:#1A7F4B;
      --danger:#B3261E;
      --radius:10px;
      --sans:'IBM Plex Sans',system-ui,sans-serif;
      --serif:'Source Serif 4',Georgia,serif;
      --mono:'IBM Plex Mono',ui-monospace,monospace;
    }
    *{ box-sizing:border-box; }
    html{ -webkit-text-size-adjust:100%; }
    body{
      margin:0;
      font-family:var(--sans);
      background:var(--surface);
      color:var(--ink);
      line-height:1.55;
    }
    .wrap{ max-width:1100px; margin:0 auto; padding:1.25rem 1rem 4rem; }
    .col{ max-width:760px; margin:0 auto; }

    /* ---- Header ---- */
    header{
      display:flex; align-items:center; justify-content:space-between;
      gap:1rem; padding-block:.5rem 1.75rem;
    }
    .wordmark{ display:flex; align-items:center; gap:.65rem; }
    .wordmark img{ height:40px; width:auto; }
    .wordmark .titles{ display:flex; flex-direction:column; line-height:1.2; }
    .wordmark .name{ font-weight:600; font-size:1rem; letter-spacing:-.01em; }
    .wordmark .tag{ font-size:.74rem; color:var(--muted); }
    .corpus-note{
      font-size:.74rem; color:var(--muted); text-align:end;
      max-inline-size:16rem;
    }
    @media (max-width:560px){ .corpus-note{ display:none; } }

    /* ---- Ask bar ---- */
    .askbar{
      display:flex; align-items:center; gap:.5rem;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:.35rem .35rem .35rem 1rem;
      box-shadow:0 1px 2px rgba(22,32,43,.04);
      transition:border-color .15s, box-shadow .15s;
    }
    .askbar:focus-within{
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-wash);
    }
    .askbar input{
      flex:1; min-width:0;
      border:0; outline:0; background:transparent;
      font:inherit; font-size:1.02rem; color:var(--ink);
      padding-block:.65rem;
    }
    .askbar input::placeholder{ color:#93A1B1; }
    .icon-btn{
      flex:none; display:grid; place-items:center;
      width:2.25rem; height:2.25rem;
      border:0; border-radius:8px; background:transparent;
      color:var(--muted); cursor:pointer;
    }
    .icon-btn:hover{ background:var(--accent-wash); color:var(--ink); }
    .ask-btn{
      flex:none; display:inline-flex; align-items:center; gap:.45rem;
      border:0; border-radius:8px; cursor:pointer;
      background:var(--accent); color:#fff;
      font:inherit; font-weight:600; font-size:.92rem;
      padding:.6rem 1.05rem;
    }
    .ask-btn:hover{ background:var(--accent-ink); }
    .ask-btn:disabled{ opacity:.55; cursor:default; }
    :is(button,input):focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

    /* ---- Answer ---- */
    #answerCard{
      display:none;
      margin-top:1.5rem;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:1.4rem 1.5rem 1.2rem;
    }
    .eyebrow{
      font-size:.7rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--accent);
      margin-bottom:.7rem; display:flex; align-items:center; gap:.6rem;
    }
    .eyebrow::after{ content:''; flex:1; height:1px; background:var(--line); }
    #answerText{
      font-family:var(--serif);
      font-size:1.12rem; line-height:1.75;
      white-space:pre-wrap; min-height:2rem;
      text-align:start;
    }
    #answerText .cite{
      font-family:var(--sans); font-size:.7em; font-weight:600;
      vertical-align:super; line-height:0;
      color:var(--accent); cursor:pointer; text-decoration:none;
      padding-inline:.1em;
    }
    #answerText .cite:hover{ text-decoration:underline; }
    #answerText .err{ font-family:var(--sans); color:var(--danger); font-size:.95rem; }
    .answer-foot{
      display:flex; align-items:center; justify-content:space-between;
      margin-top:1rem; padding-top:.8rem; border-top:1px solid var(--line);
      gap:1rem;
    }
    .answer-foot .hint{ font-size:.74rem; color:var(--muted); }
    .mt-note{
      margin-top:.6rem; font-family:var(--sans); font-size:.74rem;
      color:var(--muted); border-inline-start:2px solid var(--verified);
      padding-inline-start:.55rem; line-height:1.4;
    }
    .ghost-btn{
      border:1px solid var(--line); background:transparent; border-radius:8px;
      font:inherit; font-size:.82rem; font-weight:500; color:var(--ink);
      padding:.4rem .8rem; cursor:pointer; display:inline-flex; align-items:center; gap:.4rem;
    }
    .ghost-btn:hover{ background:var(--accent-wash); border-color:var(--accent); }

    /* thinking pulse */
    .thinking{ display:flex; align-items:center; gap:.6rem; font-family:var(--sans); font-size:.92rem; color:var(--muted); }
    .thinking .dots{ display:inline-flex; gap:.3rem; }
    .thinking .dots i{
      width:.45rem; height:.45rem; border-radius:50%;
      background:var(--accent); opacity:.25;
      animation:pulse 1.2s infinite ease-in-out;
    }
    .thinking .dots i:nth-child(2){ animation-delay:.2s; }
    .thinking .dots i:nth-child(3){ animation-delay:.4s; }
    @keyframes pulse{ 0%,80%,100%{ opacity:.25; transform:scale(1);} 40%{ opacity:1; transform:scale(1.15);} }
    @media (prefers-reduced-motion:reduce){ .thinking .dots i{ animation:none; opacity:.7; } }

    /* ---- Sources ledger ---- */
    #sources{ display:none; margin-top:1.5rem; }
    #sources h2{
      font-size:.7rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted); margin:0 0 .7rem;
      display:flex; align-items:center; gap:.6rem;
    }
    #sources h2::after{ content:''; flex:1; height:1px; background:var(--line); }

    .meeting-tabs{
      display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:.8rem;
      position:sticky; top:0; z-index:10; background:var(--surface); padding-block:.4rem;
    }
    .meeting-tab{
      border:1px solid var(--line); background:var(--card); color:var(--ink);
      font:inherit; font-size:.82rem; font-weight:500;
      padding:.35rem .8rem; border-radius:999px; cursor:pointer;
    }
    .meeting-tab.active{ background:var(--accent); border-color:var(--accent); color:#fff; }

    .section-chips{ display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:.7rem; }
    .section-chip{
      border:0; background:var(--accent-wash); color:var(--accent-ink);
      font:inherit; font-size:.78rem; font-weight:500;
      padding:.3rem .7rem; border-radius:6px; cursor:pointer;
    }
    .section-chip.active{ background:var(--accent); color:#fff; }

    .ledger{ display:flex; flex-direction:column; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--card); }
    .ledger-row{
      display:flex; align-items:flex-start; gap:.7rem;
      padding:.6rem .85rem; cursor:pointer;
      border:0; border-block-end:1px solid var(--line);
      background:transparent; font:inherit; text-align:start; width:100%;
    }
    .ledger-row:last-child{ border-block-end:0; }
    .ledger-row:hover{ background:var(--accent-wash); }
    .ledger-row.active{ background:var(--accent-wash); box-shadow:inset 3px 0 0 var(--accent); }
    .cite-no{
      flex:none; width:1.5rem; height:1.5rem; display:grid; place-items:center;
      border-radius:50%; background:var(--accent-wash); color:var(--accent);
      font-size:.72rem; font-weight:600; margin-block-start:1px;
    }
    .row-main{ flex:1; min-width:0; }
    .row-name{ display:block; font-size:.88rem; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .row-key{ font-family:var(--mono); font-size:.7rem; color:var(--muted); }
    .row-meta{ display:block; margin-block-start:.15rem; font-size:.7rem; line-height:1.35; }
    .loe-level{ color:var(--accent); font-weight:600; }
    .loe-vote{ color:var(--muted); }
    .loe-sep{ color:var(--muted); opacity:.5; margin-inline:.15rem; }

    /* ---- PDF viewer ---- */
    #viewerCard{ display:none; margin-top:1rem; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--card); }
    #viewerHead{
      display:flex; align-items:center; justify-content:space-between; gap:1rem;
      padding:.55rem .85rem; border-bottom:1px solid var(--line);
      font-size:.82rem; color:var(--muted);
    }
    #viewerHead .vh-name{ font-weight:500; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #pdfHost{ width:100%; height:85vh; min-height:600px; }
    @media (max-width:576px){ #pdfHost{ height:80vh; min-height:60vh; } }

    .empty{ padding:1rem; color:var(--muted); font-size:.9rem; }

    /* toast */
    .toast{
      position:fixed; inset-block-end:1rem; inset-inline-end:1rem;
      background:var(--ink); color:#fff; font-size:.85rem;
      padding:.55rem .95rem; border-radius:8px;
      box-shadow:0 4px 14px rgba(22,32,43,.25);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="col">
      <div class="wordmark">
        <img src="https://static.wixstatic.com/media/0540e9_3a7da5248a3746ea9c308f860dc86574~mv2.png/v1/fill/w_264,h_124,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/icmphillylogov5transparent_edited.png" alt="ICM logo"/>
        <div class="titles">
          <span class="name">ICM Assistant</span>
          <span class="tag" id="tagline">Consensus answers, cited and verified</span>
        </div>
      </div>
      <div class="corpus-note" id="corpusNote">International Consensus Meeting proceedings · 2013–2025</div>
    </header>

    <div class="col">
      <div class="askbar">
        <input type="text" id="query" dir="auto" placeholder="Ask a clinical question…"
               autocomplete="on" spellcheck="true" autocorrect="on" autocapitalize="sentences"
               aria-label="Clinical question" />
        <button class="icon-btn" id="clearBtn" title="Clear" aria-label="Clear question">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <button class="ask-btn" id="askBtn">
          <span id="askLabel">Ask</span>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 8h11M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <section id="answerCard" aria-live="polite" aria-label="AI response">
        <div class="eyebrow" id="answerEyebrow">ICM consensus answer</div>
        <div id="answerText" dir="auto"></div>
        <div id="mtNote" class="mt-note" dir="auto" style="display:none;"></div>
        <div class="answer-foot" id="answerFoot" style="display:none;">
          <span class="hint" id="answerHint">Quotations are validated against the source records before display.</span>
          <button class="ghost-btn" id="copyBtn">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 11V3.5A1.5 1.5 0 0 1 4.5 2H11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <span id="copyLabel">Copy answer</span>
          </button>
        </div>
      </section>

      <section id="sources">
        <h2 id="sourcesTitle">Sources</h2>
        <div class="meeting-tabs" id="meetingTabs"></div>
        <div id="meetingPanels"></div>
      </section>
    </div>

    <div id="viewerCard">
      <div id="viewerHead">
        <span class="vh-name" id="viewerName"></span>
        <span id="viewerMeeting"></span>
      </div>
      <div id="pdfHost"></div>
    </div>
  </div>

  <script>
    'use strict';
    // ====== I18N ======
    const USER_LANG = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
    document.documentElement.lang = USER_LANG.split('-')[0];

    const STRINGS = {
      en:{ ask:'Ask', ph:'Ask a clinical question…', tag:'Consensus answers, cited and verified', eyebrow:'ICM consensus answer', sources:'Sources', copy:'Copy answer', copied:'Answer copied', hint:'Quotations are validated against the source records before display.', none:'No relevant documents found.', verified:'Verified', unverified:'Unverified', thinking:'Searching the proceedings…' },
      es:{ ask:'Preguntar', ph:'Haz una pregunta clínica…', tag:'Respuestas de consenso, citadas y verificadas', eyebrow:'Respuesta de consenso ICM', sources:'Fuentes', copy:'Copiar respuesta', copied:'Respuesta copiada', hint:'Las citas se validan contra los registros originales antes de mostrarse.', none:'No se encontraron documentos relevantes.', verified:'Verificado', unverified:'No verificado', thinking:'Buscando en las actas…' },
      fr:{ ask:'Demander', ph:'Posez une question clinique…', tag:'Réponses de consensus, citées et vérifiées', eyebrow:'Réponse de consensus ICM', sources:'Sources', copy:'Copier la réponse', copied:'Réponse copiée', hint:'Les citations sont validées par rapport aux documents sources avant affichage.', none:'Aucun document pertinent trouvé.', verified:'Vérifié', unverified:'Non vérifié', thinking:'Recherche dans les actes…' },
      de:{ ask:'Fragen', ph:'Stellen Sie eine klinische Frage…', tag:'Konsensantworten, zitiert und verifiziert', eyebrow:'ICM-Konsensantwort', sources:'Quellen', copy:'Antwort kopieren', copied:'Antwort kopiert', hint:'Zitate werden vor der Anzeige gegen die Quelldokumente validiert.', none:'Keine relevanten Dokumente gefunden.', verified:'Verifiziert', unverified:'Nicht verifiziert', thinking:'Durchsuche die Protokolle…' },
      pt:{ ask:'Perguntar', ph:'Faça uma pergunta clínica…', tag:'Respostas de consenso, citadas e verificadas', eyebrow:'Resposta de consenso ICM', sources:'Fontes', copy:'Copiar resposta', copied:'Resposta copiada', hint:'As citações são validadas contra os registros originais antes da exibição.', none:'Nenhum documento relevante encontrado.', verified:'Verificado', unverified:'Não verificado', thinking:'Pesquisando nos anais…' },
      it:{ ask:'Chiedi', ph:'Fai una domanda clinica…', tag:'Risposte di consenso, citate e verificate', eyebrow:'Risposta di consenso ICM', sources:'Fonti', copy:'Copia risposta', copied:'Risposta copiata', hint:'Le citazioni sono convalidate rispetto ai documenti originali prima della visualizzazione.', none:'Nessun documento pertinente trovato.', verified:'Verificato', unverified:'Non verificato', thinking:'Ricerca negli atti…' },
      ar:{ ask:'اسأل', ph:'اطرح سؤالًا طبيًا…', tag:'إجابات إجماعية، موثّقة ومُتحقَّق منها', eyebrow:'إجابة إجماع ICM', sources:'المصادر', copy:'نسخ الإجابة', copied:'تم نسخ الإجابة', hint:'يتم التحقق من الاقتباسات مقابل السجلات الأصلية قبل العرض.', none:'لم يتم العثور على مستندات ذات صلة.', verified:'مُتحقَّق', unverified:'غير مُتحقَّق', thinking:'جارٍ البحث في الوقائع…' },
      zh:{ ask:'提问', ph:'请提出临床问题…', tag:'共识答案，附引用并经验证', eyebrow:'ICM 共识答案', sources:'来源', copy:'复制答案', copied:'已复制答案', hint:'引文在显示前已与原始记录核对。', none:'未找到相关文档。', verified:'已验证', unverified:'未验证', thinking:'正在检索会议纪要…' },
    };
    const S = STRINGS[(USER_LANG||'en').toLowerCase().split('-')[0]] || STRINGS.en;
    // Answer language follows the UI locale (sent to the backend as X-User-Lang).
    // For any non-English answer, show a machine-translation note pointing the
    // clinician at the authoritative English source; the cited quotes/[keys] and
    // the linked English PDF remain the ground truth in every language.
    const ANSWER_LANG = (USER_LANG||'en').toLowerCase().split('-')[0];
    const MT_NOTE = {
      en:'Machine-translated — verify wording against the cited English source.',
      es:'Traducción automática — verifique el texto con la fuente original en inglés citada.',
      fr:'Traduction automatique — vérifiez le texte avec la source anglaise citée.',
      de:'Maschinell übersetzt — Wortlaut mit der zitierten englischen Quelle abgleichen.',
      pt:'Tradução automática — verifique o texto com a fonte original em inglês citada.',
      it:'Traduzione automatica — verificare il testo con la fonte inglese citata.',
      ar:'ترجمة آلية — يُرجى التحقق من الصياغة مقابل المصدر الإنجليزي المُستشهد به.',
      zh:'机器翻译 — 请对照所引用的英文原文核对措辞。'
    };
    const MT_NOTE_TEXT = MT_NOTE[ANSWER_LANG] || MT_NOTE.en;

    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

    $('#askLabel').textContent = S.ask;
    $('#query').placeholder = S.ph;
    $('#tagline').textContent = S.tag;
    $('#answerEyebrow').textContent = S.eyebrow;
    $('#sourcesTitle').textContent = S.sources;
    $('#copyLabel').textContent = S.copy;
    $('#answerHint').textContent = S.hint;

    // ====== STATE ======
    // Adobe PDF SDK is heavy; load it only when a PDF is first opened so that
    // question-only sessions (the common case, and where mobile memory reloads
    // were happening) never pay its resident cost.
    let _sdkPromise = null;
    function ensureAdobeSDK(){
      if (_sdkPromise) return _sdkPromise;
      _sdkPromise = new Promise((resolve, reject) => {
        if (window.AdobeDC) return resolve();
        window.addEventListener('adobe_dc_view_sdk.ready', () => resolve(), { once:true });
        const s = document.createElement('script');
        s.src = 'https://acrobatservices.adobe.com/view-sdk/viewer.js';
        s.onerror = () => { _sdkPromise = null; reject(new Error('Adobe SDK failed to load')); };
        document.head.appendChild(s);
      });
      return _sdkPromise;
    }
    let currentDocs = [];          // last documents payload
    let keyToCite = new Map();     // record key -> cite number

    // ====== HELPERS ======
    const dataField = (line) => line.startsWith('data: ') ? line.slice(6) : line.slice(5);
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    const groupBy = (arr, key) =>
      arr.reduce((acc, item) => {
        const k = (item?.[key] ?? 'Uncategorized').toString();
        (acc[k] ||= []).push(item);
        return acc;
      }, {});

    const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const safeName = (doc) => {
      if (doc?.name && String(doc.name).trim()) return String(doc.name);
      try {
        const u = new URL(doc.url);
        const leaf = decodeURIComponent(u.pathname.split('/').pop() || '').replace(/\+/g, ' ');
        return leaf || 'Document';
      } catch { return 'Document'; }
    };

    // ====== ANSWER RENDERING ======
    const answerCard = $('#answerCard');
    const answerEl = $('#answerText');

    function showThinking(){
      answerCard.style.display = 'block';
      $('#answerFoot').style.display = 'none';
      $('#mtNote').style.display = 'none';
      answerEl.innerHTML = '';
      const t = document.createElement('div');
      t.className = 'thinking';
      t.innerHTML = `<span class="dots"><i></i><i></i><i></i></span><span>${S.thinking}</span>`;
      answerEl.appendChild(t);
    }

    // After streaming completes, swap inline [key] markers for superscript
    // citation links when the documents payload carries cite numbers.
    function decorateCitations(){
      if (!keyToCite.size) return;
      const raw = answerEl.textContent;
      const frag = document.createDocumentFragment();
      let last = 0;
      const re = /\[\s*([0-9]{4}(?:[-\u2010-\u2015\u2212][A-Za-z0-9]+)+)\s*\]/g;
      let m, replaced = false;
      while ((m = re.exec(raw)) !== null) {
        const key = m[1].replace(/[\u2010-\u2015\u2212]/g, '-');
        const n = keyToCite.get(key);
        if (n == null) continue;
        replaced = true;
        frag.appendChild(document.createTextNode(raw.slice(last, m.index)));
        const a = document.createElement('a');
        a.className = 'cite';
        a.textContent = n;
        a.href = '#';
        a.title = ((currentDocs.find(d => (d.key||'') === key) || {}).name) || '';
        a.addEventListener('click', (e) => { e.preventDefault(); openDocByKey(key); });
        frag.appendChild(a);
        last = m.index + m[0].length;
      }
      if (!replaced) return;
      frag.appendChild(document.createTextNode(raw.slice(last)));
      answerEl.innerHTML = '';
      answerEl.appendChild(frag);
    }

    // ====== SOURCES LEDGER ======
    function renderDocs(documents){
      currentDocs = Array.isArray(documents) ? documents : [];
      keyToCite = new Map();
      let auto = 1;
      for (const d of currentDocs) {
        const n = Number(d?.cite_number);
        const cite = Number.isFinite(n) && n > 0 ? n : auto;
        d._cite = cite;
        auto = Math.max(auto, cite) + 1;
        if (d.key) keyToCite.set(d.key, cite);
      }

      const sources = $('#sources');
      const tabsEl = $('#meetingTabs');
      const panelsEl = $('#meetingPanels');
      tabsEl.innerHTML = '';
      panelsEl.innerHTML = '';
      sources.style.display = 'block';

      if (!currentDocs.length) {
        panelsEl.innerHTML = `<p class="empty">${S.none}</p>`;
        $('#viewerCard').style.display = 'none';
        $('#pdfHost').innerHTML = '';
        return;
      }

      const byMeeting = groupBy(currentDocs, 'meeting');
      Object.keys(byMeeting).forEach((meeting, mIdx) => {
        const tab = document.createElement('button');
        tab.className = 'meeting-tab' + (mIdx === 0 ? ' active' : '');
        tab.textContent = meeting || 'Uncategorized';
        tab.addEventListener('click', () => {
          $$('.meeting-tab', tabsEl).forEach(b => b.classList.remove('active'));
          tab.classList.add('active');
          $$('.meeting-panel', panelsEl).forEach(p => p.style.display = 'none');
          panel.style.display = 'block';
        });
        tabsEl.appendChild(tab);

        const panel = document.createElement('div');
        panel.className = 'meeting-panel';
        panel.style.display = mIdx === 0 ? 'block' : 'none';

        const bySection = groupBy(byMeeting[meeting], 'meeting_section');
        const sectionKeys = Object.keys(bySection);

        const chips = document.createElement('div');
        chips.className = 'section-chips';
        const ledgers = document.createElement('div');

        sectionKeys.forEach((section, sIdx) => {
          const chip = document.createElement('button');
          chip.className = 'section-chip' + (sIdx === 0 ? ' active' : '');
          chip.textContent = section || 'General';
          chip.addEventListener('click', () => {
            $$('.section-chip', chips).forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            $$('.ledger', ledgers).forEach(l => l.style.display = 'none');
            ledger.style.display = 'flex';
          });
          if (sectionKeys.length > 1) chips.appendChild(chip);

          const ledger = document.createElement('div');
          ledger.className = 'ledger';
          ledger.style.display = sIdx === 0 ? 'flex' : 'none';

          bySection[section].forEach(doc => {
            const row = document.createElement('button');
            row.className = 'ledger-row';
            row.dataset.key = doc.key || '';
            const loe = (doc.loe || '').trim();
            const vote = (doc.vote || '').trim();
            let meta = '';
            if (loe || vote) {
              const parts = [];
              if (loe) parts.push(`<span class="loe-level" title="${esc(S.loeLabel || 'Level of evidence')}">${esc(loe)}</span>`);
              if (vote) parts.push(`<span class="loe-vote" title="${esc(S.voteLabel || 'Delegate agreement')}">${esc(vote)}</span>`);
              meta = `<span class="row-meta">${parts.join('<span class="loe-sep">\u00b7</span>')}</span>`;
            }
            row.innerHTML = `
              <span class="cite-no">${doc._cite}</span>
              <span class="row-main">
                <span class="row-name">${safeName(doc)}</span>
                ${meta}
              </span>`;
            row.addEventListener('click', () => openDoc(doc, row));
            ledger.appendChild(row);
          });
          ledgers.appendChild(ledger);
        });

        panel.appendChild(chips);
        panel.appendChild(ledgers);
        panelsEl.appendChild(panel);
      });

      // Auto-open the first document
      const firstRow = panelsEl.querySelector('.ledger-row');
      if (firstRow) firstRow.click();
    }

    function openDocByKey(key){
      const row = $(`.ledger-row[data-key="${CSS.escape(key)}"]`);
      if (row) { row.click(); row.scrollIntoView({ behavior:'smooth', block:'center' }); }
    }

    // ====== ADOBE VIEWER ======
    async function openDoc(doc, row){
      $$('.ledger-row').forEach(r => r.classList.remove('active'));
      if (row) row.classList.add('active');

      const card = $('#viewerCard');
      card.style.display = 'block';
      $('#viewerName').textContent = safeName(doc);
      $('#viewerMeeting').textContent = doc.meeting || '';

      try { await ensureAdobeSDK(); }
      catch (err) { console.error(err); return; }

      const host = $('#pdfHost');
      host.innerHTML = '';

      try {
        const view = new AdobeDC.View({ clientId: 'a429093448a84462aa44bb6e50dd82d5', divId: 'pdfHost' });
        const v = await view.previewFile(
          { content: { location: { url: doc.url } }, metaData: { fileName: ' ' } },
          { showDownloadPDF: true, showPrintPDF: true, showZoomControl: true,
            dockPageControls: true, enableLinearization: true, embedMode: 'FULL_WINDOW' }
        );
        const apis = await v.getAPIs();
        // Sliced PDFs start at the cited page, so the backend sets view_page=1; full
        // PDFs fall back to the original page number for a deep-link.
        const want = doc?.view_page ?? doc?.page;
        const page = Number.isFinite(Number(want)) ? Math.max(1, Math.floor(Number(want))) : 1;
        try { await apis.gotoLocation(page, 0, 0); } catch (err) { console.error('Adobe gotoLocation error:', err); }
      } catch (err) {
        console.error('Adobe preview error:', err);
      }
    }

    // ====== FETCH / STREAM ======
    async function sendQuery(){
      const queryText = $('#query').value.trim();
      if (!queryText) { $('#query').focus(); return; }

      if (window._aborter) window._aborter.abort();
      window._aborter = new AbortController();

      // reset UI
      $('#sources').style.display = 'none';
      $('#viewerCard').style.display = 'none';
      $('#pdfHost').innerHTML = '';          // release the previous PDF's viewer memory
      $('#meetingTabs').innerHTML = '';
      $('#meetingPanels').innerHTML = '';
      $('#askBtn').disabled = true;
      showThinking();

      let gotToken = false;
      const startText = () => { if (!gotToken) { answerEl.innerHTML = ''; gotToken = true; } };
      const appendText = (t) => { startText(); answerEl.textContent += t; };
      const showError = (msg) => { answerEl.innerHTML = `<p class="err">${msg || 'Request failed.'}</p>`; };

      try {
        const url = `https://chatbot-production-3924.up.railway.app/search?ts=${Date.now()}`;
        const resp = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'text/event-stream',
            'X-User-Lang': USER_LANG
          },
          body: JSON.stringify({ query: queryText }),
          signal: window._aborter.signal,
          cache: 'no-store',
          redirect: 'follow'
        });
        if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);

        const reader = resp.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';

        const handleEvent = (eventType, dataStr) => {
          if (!dataStr) return;
          if (eventType === 'token') { appendText(dataStr); return; }
          if (eventType === 'documents') {
            try { renderDocs(JSON.parse(dataStr)); } catch {}
            return;
          }
          if (eventType === 'error') {
            try { showError('LLM error: ' + (JSON.parse(dataStr).error || 'Unknown')); }
            catch { showError('LLM error.'); }
            return;
          }
          // fallback: envelope format {token:"…"} / {documents:[…]} / {error:"…"}
          try {
            const payload = JSON.parse(dataStr);
            if (Array.isArray(payload.documents)) renderDocs(payload.documents);
            else if (typeof payload.token === 'string') appendText(payload.token);
            else if (payload.error) showError('LLM error: ' + payload.error);
          } catch {
            appendText(dataStr); // last resort: plain text
          }
        };

        const parseBlock = (evt) => {
          let eventType = 'message';
          const dataLines = [];
          for (const line of evt.split(/\r?\n/)) {
            if (!line) continue;
            if (line.startsWith(':')) continue;               // comment/keepalive
            if (line.startsWith('event:')) eventType = line.slice(6).trim();
            else if (line.startsWith('data:')) dataLines.push(dataField(line));
          }
          if (eventType === 'keepalive' || eventType === 'ping') return;
          handleEvent(eventType, dataLines.join('\n'));
        };

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split(/\r?\n\r?\n/);
          buffer = events.pop() || '';
          for (const evt of events) parseBlock(evt);
        }
        if (buffer.trim()) { try { parseBlock(buffer); } catch {} }

        if (!gotToken) answerEl.innerHTML = '';   // clear pulse if nothing streamed
        decorateCitations();
        $('#answerFoot').style.display = gotToken ? 'flex' : 'none';
        if (gotToken && ANSWER_LANG !== 'en') {
          const mt = $('#mtNote');
          mt.textContent = MT_NOTE_TEXT;
          mt.style.display = 'block';
        }
        answerCard.scrollIntoView({ behavior:'smooth', block:'start' });
      } catch (e) {
        if (e.name !== 'AbortError') showError(`Request failed: ${e.message}`);
      } finally {
        $('#askBtn').disabled = false;
      }
    }

    // ====== CLIPBOARD ======
    function copyAnswer(){
      navigator.clipboard.writeText(answerEl.innerText).then(() => {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.setAttribute('role', 'status');
        toast.textContent = S.copied;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      });
    }

    // ====== EVENTS ======
    $('#askBtn').addEventListener('click', sendQuery);
    $('#clearBtn').addEventListener('click', () => { $('#query').value = ''; $('#query').focus(); });
    $('#copyBtn').addEventListener('click', copyAnswer);
    $('#query').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>
